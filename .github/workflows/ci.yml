name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: paytm_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/paytm_test
      run: |
        cd packages/db
        npx prisma generate

    - name: Run linting (user-app)
      run: |
        cd apps/user-app
        npm run lint

    - name: TypeScript check (user-app)
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/paytm_test
      run: |
        cd apps/user-app
        npx tsc --noEmit

    - name: Build user-app
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/paytm_test
        NEXTAUTH_SECRET: "ci-test-secret"
        NEXTAUTH_URL: "http://localhost:3001"
      run: |
        cd apps/user-app
        npm run build

    - name: Build merchant-app
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/paytm_test
        NEXTAUTH_SECRET: "ci-test-secret"
        NEXTAUTH_URL: "http://localhost:3000"
        GOOGLE_CLIENT_ID: "test-client-id"
        GOOGLE_CLIENT_SECRET: "test-client-secret"
      run: |
        cd apps/merchant-app
        npm run build
