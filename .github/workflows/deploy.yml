name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy-user-app:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: |
        cd packages/db
        npx prisma generate

    - name: Build user-app
      run: |
        cd apps/user-app
        npm run build

    - name: Deploy user-app
      run: |
        cd apps/user-app
        npx vercel --token ${{ secrets.VERCEL_TOKEN }} --prod

  deploy-merchant-app:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: |
        cd packages/db
        npx prisma generate

    - name: Build merchant-app
      run: |
        cd apps/merchant-app
        npm run build

    - name: Deploy merchant-app
      run: |
        cd apps/merchant-app
        npx vercel --token ${{ secrets.VERCEL_TOKEN }} --prod

  deploy-bank-webhook:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build bank-webhook-handler
      run: |
        cd apps/bank_webhook_handler
        npm run build

    - name: Deploy bank-webhook-handler
      run: |
        cd apps/bank_webhook_handler
        zip -r deploy.zip . -x "*.git*" "node_modules/*"
        curl -X POST \
          -H "Authorization: Bearer ${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
          -H "Content-Type: application/zip" \
          -F "archive=@deploy.zip" \
          ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
