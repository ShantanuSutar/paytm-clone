version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: paytm_ci
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.ci
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/paytm_ci
    volumes:
      - .:/app
      - /app/node_modules
    command: >
      sh -c "
        npm ci &&
        cd packages/db && npx prisma generate &&
        cd ../.. &&
        npm run lint &&
        npx tsc --noEmit &&
        npm run build
      "
